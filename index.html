<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#bfe6ff">
<title>Duckdoku</title>
<script>
/* phones, Capacitor, or anything embedded go straight to the raw game */
(function(){
  try{
    var mob=/Android|iPhone|iPod|Mobile/i.test(navigator.userAgent||'');
    if(mob||(window.innerWidth||0)<700||window.Capacitor||window.top!==window.self){
      try{ if(Date.now()-(+sessionStorage.getItem('ddRedir')||0)<3000)return; sessionStorage.setItem('ddRedir',String(Date.now())); }catch(e){}
      location.replace('game.html'+(location.search||'')+(location.hash||''));
    }
  }catch(e){}
})();
</script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#bfe6ff;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
/* ---- sky: soft blue with a warm sun glow ---- */
.bg{position:fixed;inset:0;background:
  radial-gradient(54vw 42vw at 80% 12%, rgba(255,243,200,.9) 0%, rgba(255,228,150,.35) 36%, transparent 64%),
  linear-gradient(180deg,#bfe6ff 0%,#d7f0ff 40%,#eaf8ff 60%,#e9f7ec 72%,#dff3e6 100%)}
@keyframes drift{0%{transform:translateY(0)}100%{transform:translateY(-16px)}}
@keyframes twinkle{0%,100%{opacity:.18;transform:scale(.7)}50%{opacity:.95;transform:scale(1.1)}}
@keyframes bob{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-7px) rotate(2deg)}}
@keyframes ripple{0%{transform:scale(.6);opacity:.5}100%{transform:scale(1.5);opacity:0}}
.cloud{position:fixed;pointer-events:none;will-change:transform;opacity:.96;filter:drop-shadow(0 6px 8px rgba(90,140,190,.18))}
.spark{position:fixed;pointer-events:none}
.duckie{position:fixed;pointer-events:none;animation:bob 4s ease-in-out infinite}
.pad{position:fixed;pointer-events:none}
@media (prefers-reduced-motion:reduce){.cloud,.spark,.duckie{animation:none!important}}
/* ---- pond at the bottom ---- */
.pond{position:fixed;left:0;right:0;bottom:0;height:34vh;pointer-events:none;
  background:linear-gradient(180deg, rgba(120,200,236,.0) 0%, #8fd0ef 14%, #5fb6e6 55%, #4aa3da 100%);
  border-top-left-radius:50% 22px;border-top-right-radius:50% 22px}
.ripp{position:fixed;border:2px solid rgba(255,255,255,.6);border-radius:50%;pointer-events:none}
/* ---- soft vignette to seat the phone ---- */
.vignette{position:fixed;inset:0;pointer-events:none;background:radial-gradient(135vh 105vh at 50% 46%, transparent 56%, rgba(40,80,120,.26) 100%)}
/* ---- centered phone frame ---- */
.stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center}
.frame{position:relative;
  width:min(412px, calc((100vh - 40px) * 0.49), calc(100vw - 28px));
  height:min(852px, calc(100vh - 28px));
  background:linear-gradient(165deg,#f6b15a 0%,#e8942f 34%,#c9781e 100%);
  border-radius:46px;padding:12px;
  box-shadow:
    0 46px 96px rgba(120,80,30,.45),
    0 16px 34px rgba(120,80,30,.4),
    inset 0 0 0 2px rgba(255,221,150,.7),
    inset 0 3px 0 rgba(255,255,255,.32)}
.notch{position:absolute;top:13px;left:50%;transform:translateX(-50%);width:34%;height:7px;border-radius:5px;background:rgba(90,55,20,.35);z-index:3}
.frame-inner{width:100%;height:100%;border-radius:34px;overflow:hidden;background:#F3ECEC;position:relative}
iframe{width:100%;height:100%;border:0;display:block;background:#F3ECEC}
.brand{position:fixed;left:50%;bottom:16px;transform:translateX(-50%);z-index:3;
  font-weight:900;font-size:16px;letter-spacing:.4px;color:#6E4F44;opacity:.8;pointer-events:none;text-shadow:0 1px 0 rgba(255,255,255,.6)}
.brand b{color:#e8942f}
</style>
</head>
<body>
<div class="bg"></div>

<!-- drifting clouds -->
<svg class="cloud" style="left:6%;top:14%;width:150px;animation:drift 10s ease-in-out infinite alternate" viewBox="0 0 100 60" aria-hidden="true"><g fill="#fff"><ellipse cx="32" cy="40" rx="24" ry="18"/><ellipse cx="56" cy="34" rx="27" ry="23"/><ellipse cx="76" cy="42" rx="20" ry="16"/><rect x="14" y="40" width="74" height="17" rx="8.5"/></g></svg>
<svg class="cloud" style="right:7%;top:26%;width:116px;animation:drift 12s ease-in-out infinite alternate;animation-delay:1.4s" viewBox="0 0 100 60" aria-hidden="true"><g fill="#fff"><ellipse cx="32" cy="40" rx="24" ry="18"/><ellipse cx="56" cy="34" rx="27" ry="23"/><ellipse cx="76" cy="42" rx="20" ry="16"/><rect x="14" y="40" width="74" height="17" rx="8.5"/></g></svg>
<svg class="cloud" style="left:12%;top:40%;width:96px;animation:drift 11s ease-in-out infinite alternate;animation-delay:.6s;opacity:.85" viewBox="0 0 100 60" aria-hidden="true"><g fill="#fff"><ellipse cx="32" cy="40" rx="24" ry="18"/><ellipse cx="56" cy="34" rx="27" ry="23"/><ellipse cx="76" cy="42" rx="20" ry="16"/><rect x="14" y="40" width="74" height="17" rx="8.5"/></g></svg>

<!-- gold sparkles -->
<svg class="spark" style="left:24%;top:22%;width:20px;animation:twinkle 3.2s ease-in-out infinite" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2 L14 10 L22 12 L14 14 L12 22 L10 14 L2 12 L10 10 Z" fill="#ffc01e"/></svg>
<svg class="spark" style="right:26%;top:15%;width:15px;animation:twinkle 4s ease-in-out infinite;animation-delay:.5s" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2 L14 10 L22 12 L14 14 L12 22 L10 14 L2 12 L10 10 Z" fill="#ffd34d"/></svg>
<svg class="spark" style="left:8%;top:58%;width:17px;animation:twinkle 3.6s ease-in-out infinite;animation-delay:1.1s" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2 L14 10 L22 12 L14 14 L12 22 L10 14 L2 12 L10 10 Z" fill="#ffc01e"/></svg>
<svg class="spark" style="right:9%;top:46%;width:22px;animation:twinkle 4.4s ease-in-out infinite;animation-delay:.8s" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2 L14 10 L22 12 L14 14 L12 22 L10 14 L2 12 L10 10 Z" fill="#ffd34d"/></svg>
<svg class="spark" style="left:40%;top:10%;width:14px;animation:twinkle 3.9s ease-in-out infinite;animation-delay:1.6s" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2 L14 10 L22 12 L14 14 L12 22 L10 14 L2 12 L10 10 Z" fill="#ffc01e"/></svg>

<!-- pond -->
<div class="pond"></div>
<div class="ripp" style="left:16%;bottom:14%;width:60px;height:18px;animation:ripple 5s ease-out infinite"></div>
<div class="ripp" style="right:18%;bottom:20%;width:50px;height:15px;animation:ripple 6s ease-out infinite;animation-delay:1.5s"></div>
<div class="ripp" style="left:24%;bottom:8%;width:70px;height:20px;animation:ripple 5.5s ease-out infinite;animation-delay:2.5s"></div>

<!-- lily pads + lotus -->
<svg class="pad" style="left:5%;bottom:11%;width:120px" viewBox="0 0 120 60" aria-hidden="true"><path d="M60 6 C100 6 116 26 116 36 C116 50 92 56 60 56 C28 56 4 50 4 36 C4 26 20 6 60 6 Z" fill="#7cc06a"/><path d="M60 30 L60 6 A 30 30 0 0 0 40 12 Z" fill="#6aa959"/></svg>
<svg class="pad" style="right:6%;bottom:16%;width:96px" viewBox="0 0 120 60" aria-hidden="true"><path d="M60 6 C100 6 116 26 116 36 C116 50 92 56 60 56 C28 56 4 50 4 36 C4 26 20 6 60 6 Z" fill="#8bd17c"/><path d="M60 30 L60 6 A 30 30 0 0 1 80 12 Z" fill="#79bd6b"/></svg>
<svg class="pad" style="right:10%;bottom:15%;width:46px" viewBox="0 0 60 60" aria-hidden="true"><g><ellipse cx="30" cy="40" rx="20" ry="9" fill="#f7b8d0"/><path d="M30 40 C20 24 22 16 30 12 C38 16 40 24 30 40 Z" fill="#ef94b6"/><path d="M30 40 C16 34 12 26 16 18 C26 20 32 28 30 40 Z" fill="#f4a7c5"/><path d="M30 40 C44 34 48 26 44 18 C34 20 28 28 30 40 Z" fill="#f4a7c5"/><circle cx="30" cy="32" r="5" fill="#ffd23f"/></g></svg>

<!-- reeds / cattails -->
<svg style="position:fixed;left:1%;bottom:8%;width:54px;height:30vh;pointer-events:none" viewBox="0 0 60 300" preserveAspectRatio="xMidYMax meet" aria-hidden="true"><g stroke="#5fa64e" stroke-width="6" fill="none" stroke-linecap="round"><path d="M20 300 L20 60"/><path d="M38 300 L38 96"/></g><rect x="14" y="40" width="12" height="40" rx="6" fill="#8a5a32"/><rect x="32" y="78" width="12" height="36" rx="6" fill="#a06a3c"/><path d="M20 60 q-10 -14 -2 -26" stroke="#6cbb56" stroke-width="5" fill="none" stroke-linecap="round"/></svg>
<svg style="position:fixed;right:1%;bottom:10%;width:50px;height:26vh;pointer-events:none" viewBox="0 0 60 300" preserveAspectRatio="xMidYMax meet" aria-hidden="true"><g stroke="#5fa64e" stroke-width="6" fill="none" stroke-linecap="round"><path d="M30 300 L30 70"/><path d="M44 300 L44 120"/></g><rect x="24" y="50" width="12" height="40" rx="6" fill="#8a5a32"/><path d="M30 70 q12 -14 3 -28" stroke="#6cbb56" stroke-width="5" fill="none" stroke-linecap="round"/></svg>

<!-- little floating rubber ducks -->
<svg class="duckie" style="left:8%;bottom:5%;width:64px;animation-duration:4.2s" viewBox="0 0 64 48" aria-hidden="true"><ellipse cx="30" cy="34" rx="22" ry="13" fill="#FFD23F"/><circle cx="44" cy="20" r="11" fill="#FFD23F"/><path d="M53 20 l10 2 -10 4 z" fill="#F2913C"/><circle cx="46" cy="17" r="2" fill="#3A2A20"/><path d="M9 34 q-7 1 -9 5 q7 2 12 -1z" fill="#FBC02D"/><ellipse cx="40" cy="25" rx="4" ry="2.6" fill="#F58CA8" opacity=".6"/></svg>
<svg class="duckie" style="right:9%;bottom:4%;width:50px;animation-duration:5s;animation-delay:.8s;transform:scaleX(-1)" viewBox="0 0 64 48" aria-hidden="true"><ellipse cx="30" cy="34" rx="22" ry="13" fill="#FFCE2E"/><circle cx="44" cy="20" r="11" fill="#FFCE2E"/><path d="M53 20 l10 2 -10 4 z" fill="#F2913C"/><circle cx="46" cy="17" r="2" fill="#3A2A20"/><path d="M9 34 q-7 1 -9 5 q7 2 12 -1z" fill="#F5BD1F"/></svg>

<div class="vignette"></div>

<div class="stage">
  <div class="frame">
    <div class="notch"></div>
    <div class="frame-inner">
      <iframe id="dd-game" title="Duckdoku" allow="autoplay; fullscreen; clipboard-write; web-share"></iframe>
    </div>
  </div>
</div>
<div class="brand">Duck<b>doku</b></div>

<noscript><a href="game.html" style="color:#6E4F44">Play Duckdoku</a></noscript>
<script>
(function(){ var f=document.getElementById('dd-game'); if(f) f.src='game.html'+(location.search||'')+(location.hash||''); })();
</script>
</body>
</html>
